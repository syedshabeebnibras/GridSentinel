# Auto-deploy the Next.js showcase to Vercel on push to main.
# All ${{ ... }} interpolations here are `secrets.*` only (set by the
# repository maintainer) — no untrusted GitHub event payload is used.
name: deploy-vercel

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/predict/latest_window.parquet"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vercel
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://gridsentinel.vercel.app
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel-aware)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
