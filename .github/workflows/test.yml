name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch. github.ref is a safe ref name.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package + dev deps (torch excluded to keep CI fast)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "lifelines>=0.30"

      - name: Run pytest (excluding the deep-learning smoke tests)
        run: pytest -q --ignore=tests/test_deep_baseline.py
